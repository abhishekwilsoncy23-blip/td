<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soldier Run 3D</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        
        /* The 3D Canvas */
        #gameCanvas { display: block; width: 100vw; height: 100vh; }

        /* UI Overlay */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box;
        }

        .top-bar { display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; color: white; text-shadow: 2px 2px 4px #000; }
        
        /* Intro / Pause Screen */
        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 100; pointer-events: auto;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        
        .play-btn {
            background: #4caf50; color: white; border: none; padding: 20px 50px;
            font-size: 30px; font-weight: bold; cursor: pointer; border-radius: 10px;
            text-transform: uppercase; box-shadow: 0 5px 0 #2e7d32; transition: 0.1s;
        }
        .play-btn:active { transform: translateY(5px); box-shadow: none; }

        .banner { width: 300px; height: 250px; background: #333; color: white; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; border: 2px dashed #666; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="banner">🎬 Poki Ad Banner Here</div>
        <button class="play-btn" onclick="startGame()">▶ Run!</button>
    </div>

    <div id="ui-layer">
        <div class="top-bar">
            <div>Level: <span id="levelDisplay">1</span></div>
            <div>Score: <span id="scoreDisplay">0</span></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="engine.js"></script>
    
    <script src="level1.js"></script>

</body>
</html>
